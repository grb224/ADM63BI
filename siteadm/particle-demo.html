<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Loader — Demo | 63º BI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f2e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74, 124, 89, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 124, 89, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .demo-controls {
      position: fixed;
      bottom: 30px;
      z-index: 100000;
      display: flex;
      gap: 12px;
    }

    .demo-btn {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .demo-btn.show {
      background: linear-gradient(135deg, #c9a227, #e8bc3a);
      color: #1a1200;
      box-shadow: 0 4px 16px rgba(201,162,39,0.35);
    }

    .demo-btn.show:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201,162,39,0.5);
    }

    .demo-btn.hide {
      background: #3d5016;
      color: white;
      box-shadow: 0 4px 16px rgba(61,80,22,0.25);
    }

    .demo-btn.hide:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(61,80,22,0.4);
    }

    .page-content {
      text-align: center;
      z-index: 1;
    }

    .page-content h1 {
      font-size: 28px;
      color: #3d5016;
      margin-bottom: 8px;
    }

    .page-content p {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="page-content">
    <h1>🎖️ Particle Loader Demo</h1>
    <p>63º Batalhão de Infantaria — Animação de Carregamento</p>
  </div>

  <div class="demo-controls">
    <button class="demo-btn show" onclick="loader.show()">⚡ Mostrar Loader</button>
    <button class="demo-btn hide" onclick="loader.hide()">✕ Esconder</button>
  </div>

  <script src="assets/particle-loader.js"></script>
  <script>
    const loader = new ParticleLoader(document.body, {
      logoSrc: 'assets/logo.png',
      sampleStep: 3,
      convergeDuration: 3000,
      holdDuration: 2000,
      disperseDuration: 2500,
      pauseDuration: 800,
    });

    // Auto-show on page load
    setTimeout(() => loader.show(), 300);
  </script>
</body>
</html>
