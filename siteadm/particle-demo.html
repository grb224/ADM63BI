<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Loader — Demo | 63º BI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f2e8;
      min-height: 100vh;
      overflow: hidden;
    }

    .demo-controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100000;
      display: flex;
      gap: 12px;
    }

    .demo-btn {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .demo-btn.show {
      background: linear-gradient(135deg, #c9a227, #e8bc3a);
      color: #1a1200;
      box-shadow: 0 4px 16px rgba(201,162,39,0.35);
    }

    .demo-btn.show:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201,162,39,0.5);
    }

    .demo-btn.hide {
      background: rgba(61,80,22,0.9);
      color: white;
      box-shadow: 0 4px 16px rgba(61,80,22,0.25);
    }

    .demo-btn.hide:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(61,80,22,0.4);
    }
  </style>
</head>
<body>

  <div class="demo-controls">
    <button class="demo-btn show" onclick="loader.show()">⚡ Mostrar</button>
    <button class="demo-btn hide" onclick="loader.hide()">✕ Esconder</button>
  </div>

  <script src="assets/particle-loader.js"></script>
  <script>
    const loader = new ParticleLoader(document.body, {
      text: '63° BI',
      fontSize: 140,
      sampleStep: 3,
      particleSize: 2.5,
      convergeDuration: 2800,
      holdDuration: 2200,
      disperseDuration: 2200,
      pauseDuration: 700,
    });

    // Auto-show
    setTimeout(() => loader.show(), 200);
  </script>
</body>
</html>
